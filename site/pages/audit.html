<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PortalX — Session Audit Log</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; background: #c8c8c8; margin: 0; font-size: 13px; }
    .header { background: #003366; color: white; padding: 8px 16px; font-size: 15px; font-weight: bold; }
    .header span { font-size: 11px; font-weight: normal; display: block; color: #aaccff; }
    .nav { background: #2a4b74; padding: 4px 16px; font-size: 11px; }
    .nav a { color: white; text-decoration: none; margin-right: 16px; }
    .nav a:hover { text-decoration: underline; }
    .container { max-width: 960px; margin: 30px auto; background: white; border: 1px solid #999; box-shadow: 2px 2px 6px rgba(0,0,0,0.3); }
    .section-header { background: #336699; color: white; padding: 10px 18px; font-size: 14px; font-weight: bold; }
    .body { padding: 16px 24px; }
    .audit-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .audit-table th { background: #e8edf2; padding: 8px; text-align: left; border-bottom: 2px solid #aaa; font-weight: bold; }
    .audit-table td { padding: 6px 8px; border-bottom: 1px solid #eee; vertical-align: top; }
    .audit-table tr:hover { background: #f9f9f9; }
    .action-cell { font-family: monospace; color: #003366; font-weight: bold; }
    .detail-cell { font-family: monospace; font-size: 11px; color: #555; max-width: 500px; word-wrap: break-word; }
    .ts-cell { font-family: monospace; font-size: 11px; color: #666; }
    .meta { padding: 10px 0; color: #555; font-size: 11px; border-bottom: 1px solid #ddd; margin-bottom: 12px; }
    .footer { background: #e8edf2; border-top: 1px solid #bbb; padding: 6px 16px; font-size: 10px; color: #666; text-align: center; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; background: #e8edf2; font-size: 10px; color: #333; margin-left: 6px; }
  </style>
</head>
<body>
  <div class="header">
    PortalX CGS Prior Authorization Portal
    <span>Session Audit Log</span>
  </div>
  <div class="nav">
    <a href="/patient-search">New Request</a>
    <a href="/status">Check Status</a>
    <a href="/audit">Audit Log</a>
    <a href="/login">Logout</a>
  </div>
  <div class="container">
    <div class="section-header">Session Audit Log</div>
    <div class="body">
      <div class="meta">
        Session ID: <code id="sid-display">{{SID}}</code>
        <span class="badge" id="user-badge">—</span>
        <span class="badge" id="count-badge">0 entries</span>
      </div>
      <table class="audit-table" id="audit-table">
        <thead>
          <tr>
            <th style="width:170px">Timestamp (UTC)</th>
            <th style="width:180px">Action</th>
            <th>Detail</th>
          </tr>
        </thead>
        <tbody id="audit-tbody">
          <tr><td colspan="3" style="text-align:center;padding:20px;color:#888">Loading...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="footer">© 2024 CGS Administrators, LLC. All rights reserved.</div>
  </div>

  <script>
    async function loadAudit() {
      const resp = await fetch('/api/audit');
      if (!resp.ok) {
        document.getElementById('audit-tbody').innerHTML =
          '<tr><td colspan="3" style="text-align:center;padding:20px;color:#c00">Failed to load audit log</td></tr>';
        return;
      }
      const data = await resp.json();
      document.getElementById('user-badge').textContent = data.user || 'unknown';
      document.getElementById('count-badge').textContent = (data.entries || []).length + ' entries';

      const tbody = document.getElementById('audit-tbody');
      tbody.innerHTML = '';
      if (!data.entries || data.entries.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:20px;color:#888">No audit entries yet</td></tr>';
        return;
      }
      for (const entry of data.entries) {
        const tr = document.createElement('tr');
        const dt = new Date(entry.timestamp * 1000);
        tr.innerHTML = `
          <td class="ts-cell">${dt.toISOString().replace('T', ' ').slice(0, 19)}</td>
          <td class="action-cell">${entry.action}</td>
          <td class="detail-cell">${JSON.stringify(entry.detail || {})}</td>
        `;
        tbody.appendChild(tr);
      }
    }
    loadAudit();
  </script>
</body>
</html>
